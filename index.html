<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <style>
    :root {
      --bg: #f0f0f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #777;
      --border: #e0e0e0;
      --primary: #2563eb;
      --known: #16a34a;
      --unknown: #dc2626;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --surface: #1e1e1e;
        --text: #e5e5e5;
        --text-muted: #888;
        --border: #303030;
        --primary: #3b82f6;
        --known: #22c55e;
        --unknown: #ef4444;
        --shadow: 0 4px 24px rgba(0,0,0,0.45);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

    nav { display: flex; gap: 4px; align-items: center; }
    nav button {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
    }
    nav button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .reset-btn {
      font-size: 16px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      padding: 4px 9px;
      border-radius: 20px;
      line-height: 1;
    }
    .reset-btn:hover { color: var(--unknown); border-color: var(--unknown); }
    .reset-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
    }

    /* ── Setup ── */
    .setup { width: 100%; }
    .setup-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
    }
    .setup-back:hover { color: var(--text); }
    .setup h2 { font-size: 22px; margin-bottom: 8px; }
    .setup p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 22px; }
    .setup a { color: var(--primary); }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-known   { background: var(--known);   color: #fff; }
    .btn-unknown { background: var(--unknown); color: #fff; }
    .btn-full { width: 100%; }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 11px 15px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      width: 100%;
    }
    @media (prefers-color-scheme: dark) {
      .error-banner { background: #3b0a0a; border-color: #7f1d1d; color: #fca5a5; }
    }

    /* ── Study ── */
    .study-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 18px; }

    /* Filter + shuffle bar */
    .controls-bar {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .controls-actions {
      display: flex;
      gap: 8px;
    }
    .filter-pills {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    .fpill {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .fpill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .shuffle-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .shuffle-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    .stats-bar {
      width: 100%;
      display: flex;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.k { background: var(--known); }
    .dot.u { background: var(--unknown); }
    .dot.n { background: var(--text-muted); }

    /* Card flip */
    .card-container { width: 100%; perspective: 1000px; }
    .card {
      width: 100%;
      min-height: 210px;
      display: grid;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card-face {
      grid-area: 1 / 1;
      width: 100%;
      min-height: 210px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
      background: var(--surface);
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      user-select: none;
    }
    .card-back { transform: rotateY(180deg); }
    .card-lang {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-weight: 600;
    }
    .card-word {
      font-size: 30px;
      font-weight: 700;
      text-align: center;
      line-height: 1.25;
      letter-spacing: -0.5px;
    }
    .card-hint { margin-top: 14px; font-size: 12px; color: var(--text-muted); }
    .card-tag {
      margin-top: 16px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .action-row { width: 100%; display: flex; gap: 10px; }
    .action-row .btn { flex: 1; padding: 15px; font-size: 16px; }

    .skip-btn {
      font-size: 13px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
    }
    .skip-btn:hover { color: var(--text); }

    .empty-state { text-align: center; padding: 56px 0; color: var(--text-muted); }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

    .saving { font-size: 12px; color: var(--text-muted); height: 16px; text-align: center; width: 100%; }

    .session-pill {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .session-sep { color: var(--border); }
    .reset-session-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 3px 9px;
      border-radius: 20px;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .reset-session-btn:hover { color: var(--primary); border-color: var(--primary); }

    /* ── Manage ── */
    .manage-area { width: 100%; display: flex; flex-direction: column; gap: 18px; }

    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .add-form h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; margin-bottom: 12px; }

    .import-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .import-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .import-header:hover { background: var(--bg); }
    .import-header span { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .import-header .chevron { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
    .import-header .chevron.open { transform: rotate(180deg); }
    .import-body { padding: 0 18px 18px; border-top: 1px solid var(--border); }
    .import-body p { font-size: 12px; color: var(--text-muted); margin: 12px 0 10px; line-height: 1.5; }
    .import-body code { font-family: monospace; background: var(--bg); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    .import-or { text-align: center; font-size: 12px; color: var(--text-muted); margin: 10px 0; }
    .import-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: monospace;
      resize: vertical;
      min-height: 90px;
      outline: none;
    }
    .import-textarea:focus { border-color: var(--primary); }
    .import-file-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .import-file-btn:hover { border-color: var(--primary); color: var(--primary); }
    .import-msg-ok  { font-size: 13px; color: var(--known);   margin-top: 10px; font-weight: 500; }
    .import-msg-err { font-size: 13px; color: var(--unknown); margin-top: 10px; font-weight: 500; }

    .manage-controls { display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .manage-filter { display: flex; flex-wrap: nowrap; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .manage-filter::-webkit-scrollbar { display: none; }

    .cards-list { display: flex; flex-direction: column; gap: 8px; }
    .card-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-item-text { flex: 1; min-width: 0; }
    .card-item-en { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-item-ru { font-size: 13px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .label-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .sit-badge { background: #ede9fe; color: #6d28d9; border-color: #c4b5fd; }
    @media (prefers-color-scheme: dark) { .sit-badge { background: #2e1065; color: #a78bfa; border-color: #4c1d95; } }
    .card-item-score { font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .s-k { color: var(--known); }
    .s-u { color: var(--unknown); }
    .del-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .del-btn:hover { color: var(--unknown); }

    /* Progress bar for shuffle mode */
    .progress-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #7c3aed;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .progress-count {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Stopwatch ── */
    .stopwatch {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 0 2px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .stopwatch-time {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      min-width: 64px;
      text-align: center;
    }
    .sw-btn {
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sw-btn:hover { border-color: var(--primary); color: var(--primary); }
    .sw-btn.running { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
    }
    .page-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-info { font-size: 13px; color: var(--text-muted); }

    /* ── Mobile adjustments (≤ 480px) ── */
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      header h1 { font-size: 15px; }
      nav button { padding: 5px 9px; font-size: 13px; }
      main { padding: 16px 12px 32px; }
      .card-word { font-size: 24px; }
      .action-row .btn { padding: 13px; font-size: 15px; }
      .add-form { padding: 14px; }
      .form-row { flex-direction: column; gap: 0; }
      .import-body { padding: 0 12px 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Flashcards</h1>
    <nav id="main-nav">
      <button id="btn-study" class="active" onclick="showView('study')">Study</button>
      <button id="btn-manage" onclick="showView('manage')">Cards</button>
    </nav>
  </header>
  <main id="root"></main>

<script>
var S = {
  token:        localStorage.getItem('fc_token') || '',
  gistId:       localStorage.getItem('fc_gist_id') || '',
  cards:        [],
  current:      null,
  lastId:       null,
  flipped:      false,
  saving:       false,
  view:         'study',
  err:          '',
  filterLabel:  '',       // '' = all; study mode filter
  manageFilter: '',       // manage list filter
  shuffleMode:  false,
  shuffleQueue: [],       // remaining ids in shuffle round
  direction:    'en-ru', // 'en-ru' | 'ru-en'
  importOpen:   false,
  importMsg:    '',       // feedback after import
  addMsg:       '',       // feedback from add-card form
  managePage:   0,       // current page in the manage list
  sessionKnown:   0,     // "Know it" clicks this session
  sessionUnknown: 0,     // "Don't know" clicks this session
  sessionKnownIds: {},   // {[id]: true} cards not to show again this session
  studyMode:  'vocab',   // 'vocab' | 'situation'
  addType:    'vocab',   // type selected in the add-card form
  manageTypeFilter: '',  // '' | 'vocab' | 'situation'
  swRunning:  false,     // stopwatch running?
  swElapsed:  0,         // ms accumulated before last start
  swStarted:  0          // Date.now() when last started
};

// ── Gist API ─────────────────────────────────────────────────────────────────

function hdrs() {
  return {
    'Authorization': 'token ' + S.token,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json'
  };
}

function saveGist() {
  if (!S.token || !S.gistId) return Promise.resolve();
  S.saving = true; renderSaving();
  return fetch('https://api.github.com/gists/' + S.gistId, {
    method: 'PATCH',
    headers: hdrs(),
    body: JSON.stringify({ files: { 'flashcards.json': { content: JSON.stringify({ cards: S.cards }, null, 2) } } })
  }).then(function(r) {
    S.saving = false;
    if (!r.ok) throw new Error('Save failed ' + r.status);
    renderSaving();
  }).catch(function(e) { S.saving = false; S.err = e.message; render(); });
}

var saveTimer = null;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveGist, 900);
}

function loadGist() {
  return fetch('https://api.github.com/gists/' + S.gistId, { headers: hdrs() })
    .then(function(r) { if (!r.ok) throw new Error('Load failed ' + r.status); return r.json(); })
    .then(function(d) {
      var f = d.files['flashcards.json'];
      if (f) S.cards = (JSON.parse(f.content).cards) || [];
    });
}

function createGist() {
  return fetch('https://api.github.com/gists', {
    method: 'POST', headers: hdrs(),
    body: JSON.stringify({ description: 'Flashcards App Data', public: false,
      files: { 'flashcards.json': { content: JSON.stringify({ cards: [] }, null, 2) } } })
  }).then(function(r) { if (!r.ok) throw new Error('Create gist failed ' + r.status); return r.json(); })
    .then(function(d) { S.gistId = d.id; localStorage.setItem('fc_gist_id', d.id); });
}

function initGist() {
  return fetch('https://api.github.com/gists?per_page=100', { headers: hdrs() })
    .then(function(r) { if (!r.ok) throw new Error('Auth failed ' + r.status); return r.json(); })
    .then(function(list) {
      var found = list.find(function(g) { return g.description === 'Flashcards App Data' && g.files['flashcards.json']; });
      if (found) { S.gistId = found.id; localStorage.setItem('fc_gist_id', found.id); return loadGist(); }
      else return createGist();
    });
}

// ── Card logic ────────────────────────────────────────────────────────────────

function isSituation(c) { return c.type === 'situation'; }
function isVocab(c)     { return c.type !== 'situation'; }

function filteredPool() {
  var typeOk = S.studyMode === 'situation' ? isSituation : isVocab;
  var pool = S.filterLabel
    ? S.cards.filter(function(c) { return typeOk(c) && c.label === S.filterLabel; })
    : S.cards.filter(typeOk);
  return pool.filter(function(c) { return !S.sessionKnownIds[c.id]; });
}

function weight(c) {
  var k = c.known || 0, u = c.unknown || 0;
  if (!k && !u) return 4;
  if (u > k) return u - k + 2;
  return 1;
}

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function buildShuffleQueue() {
  var pool = filteredPool();
  S.shuffleQueue = shuffleArray(pool.map(function(c) { return c.id; }));
}

function nextCard() {
  var pool = filteredPool();
  if (!pool.length) return null;

  if (S.shuffleMode) {
    // Keep queue in sync with current pool
    var poolIds = pool.map(function(c) { return c.id; });
    S.shuffleQueue = S.shuffleQueue.filter(function(id) { return poolIds.indexOf(id) !== -1; });
    if (!S.shuffleQueue.length) buildShuffleQueue();

    // Try to avoid repeating the last card
    var candidates = S.shuffleQueue.filter(function(id) { return id !== S.lastId; });
    if (!candidates.length) candidates = S.shuffleQueue;
    var nextId = candidates[0];
    S.shuffleQueue = S.shuffleQueue.filter(function(id) { return id !== nextId; });
    return pool.find(function(c) { return c.id === nextId; }) || pool[0];
  }

  // Weighted random
  var exclude = pool.length > 1 ? pool.filter(function(c) { return c.id !== S.lastId; }) : pool;
  if (!exclude.length) exclude = pool;
  var total = exclude.reduce(function(s, c) { return s + weight(c); }, 0);
  var r = Math.random() * total, cum = 0;
  for (var i = 0; i < exclude.length; i++) { cum += weight(exclude[i]); if (r < cum) return exclude[i]; }
  return exclude[exclude.length - 1];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function uniqueLabels(typeFilter) {
  var seen = {}, labels = [];
  var typeOk = typeFilter === 'situation' ? isSituation : (typeFilter === 'vocab' ? isVocab : function() { return true; });
  S.cards.filter(typeOk).forEach(function(c) {
    if (c.label && !seen[c.label]) { seen[c.label] = true; labels.push(c.label); }
  });
  return labels.sort();
}

function addCard(en, ru, label, type) {
  var t = type === 'situation' ? 'situation' : 'vocab';
  var enNorm = t === 'situation' ? en.trim() : en.trim().toLowerCase();
  var ruNorm = t === 'situation' ? ru.trim() : ru.trim().toLowerCase();
  var dup = S.cards.some(function(x) {
    return x.type === t && x.english.toLowerCase() === enNorm.toLowerCase();
  });
  if (dup) return false;
  var c = { id: uid(), english: enNorm, russian: ruNorm, label: (label || '').trim(), known: 0, unknown: 0, type: t };
  S.cards.push(c);
  if (!S.current && S.studyMode === t) S.current = c;
  scheduleSave();
  return true;
}

function delCard(id) {
  S.cards = S.cards.filter(function(c) { return c.id !== id; });
  S.shuffleQueue = S.shuffleQueue.filter(function(qid) { return qid !== id; });
  if (S.current && S.current.id === id) { S.current = nextCard(); S.flipped = false; }
  scheduleSave();
}

function markCard(known) {
  if (!S.current) return;
  if (known) { S.current.known = (S.current.known || 0) + 1; S.sessionKnown++; S.sessionKnownIds[S.current.id] = true; }
  else { S.current.unknown = (S.current.unknown || 0) + 1; S.sessionUnknown++; }
  S.lastId = S.current.id;
  S.current = nextCard();
  S.flipped = false;
  scheduleSave();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSaving() {
  var el = document.getElementById('saving-lbl');
  if (el) el.textContent = S.saving ? 'Saving…' : '';
}

function render() {
  var root = document.getElementById('root');
  if (S.view === 'token' && !S.token) { S.view = 'study'; }
  if (!S.token || S.view === 'token') { root.innerHTML = renderSetup(); return; }
  root.innerHTML = S.view === 'study' ? renderStudy() : renderManage();
}

function renderSetup() {
  var hasSession = !!(S.token);
  return '<div class="setup">' +
    '<h2>' + (hasSession ? 'Token settings' : 'Welcome') + '</h2>' +
    '<p>Cards sync across devices via a private GitHub Gist.<br><br>' +
    'You need a <strong>classic</strong> GitHub token (starts with <code>ghp_</code>) with <strong>gist</strong> scope.<br><br>' +
    '1. Go to <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>' +
    '2. Click <strong>Generate new token (classic)</strong><br>' +
    '3. Tick <strong>gist</strong> → Generate → copy the <code>ghp_…</code> token</p>' +
    (S.err ? '<div class="error-banner">' + esc(S.err) + '</div>' : '') +
    '<div class="form-group"><label>' + (hasSession ? 'New token (leave blank to keep current)' : 'GitHub Token (classic, ghp_…)') + '</label>' +
    '<input type="password" id="tok" placeholder="ghp_…" /></div>' +
    '<button class="btn btn-primary btn-full" id="conn-btn" onclick="connect()">' + (hasSession ? 'Switch token' : 'Connect') + '</button>' +
    (hasSession ? '<button class="btn btn-full" style="margin-top:10px;background:var(--bg);color:var(--unknown);border:1px solid var(--unknown)" onclick="resetToken()">Disconnect</button>' : '') +
    '</div>';
}

function renderStudy() {
  var pool = filteredPool();
  var isSit = S.studyMode === 'situation';
  var typeOk = isSit ? isSituation : isVocab;
  var modeCards = S.cards.filter(typeOk);
  var total = modeCards.length;
  var labels = uniqueLabels(S.studyMode);

  // Shuffle progress: how many cards remain in this round
  var queueLeft = S.shuffleMode ? S.shuffleQueue.length : 0;
  var poolSize  = pool.length;

  var html = '<div class="study-area">';
  html += '<div id="saving-lbl" class="saving"></div>';
  if (S.err) html += '<div class="error-banner">' + esc(S.err) + '</div>';

  // Controls bar: filter pills + shuffle button
  if (total > 0) {
    html += '<div class="controls-bar"><div class="filter-pills">';
    html += '<button class="fpill' + (!S.filterLabel ? ' active' : '') + '" onclick="setFilter(\'\')">All (' + total + ')</button>';
    labels.forEach(function(lbl) {
      var cnt = modeCards.filter(function(c) { return c.label === lbl; }).length;
      html += '<button class="fpill' + (S.filterLabel === lbl ? ' active' : '') + '" onclick="setFilter(\'' + esc(lbl) + '\')">' + esc(lbl) + ' (' + cnt + ')</button>';
    });
    html += '</div>';
    html += '<div class="controls-actions">';
    html += '<button class="shuffle-btn' + (S.shuffleMode ? ' active' : '') + '" onclick="toggleShuffle()">⇄ Shuffle</button>';
    if (!isSit) {
      html += '<button class="shuffle-btn' + (S.direction === 'ru-en' ? ' active' : '') + '" onclick="toggleDirection()" title="Flip card direction">' + (S.direction === 'en-ru' ? 'EN→RU' : 'RU→EN') + '</button>';
    }
    html += '</div></div>';
  }

  // Shuffle progress bar
  if (S.shuffleMode && poolSize > 0) {
    var done = poolSize - queueLeft;
    var pct = Math.round((done / poolSize) * 100);
    html += '<div class="progress-wrap"><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div><span class="progress-count">' + done + ' / ' + poolSize + '</span></div>';
  }

  // Stats
  if (pool.length > 0) {
    html += '<div class="stats-bar">' +
      '<span class="session-pill">' +
        '<span class="s-k">✓' + S.sessionKnown + '</span>' +
        '<span class="session-sep"> / </span>' +
        '<span class="s-u">✗' + S.sessionUnknown + '</span>' +
      '</span>' +
      '<button class="reset-session-btn" onclick="resetSession()" title="Restart session count">↺</button>' +
      '</div>';
  }

  var allInScope = S.filterLabel
    ? modeCards.filter(function(c) { return c.label === S.filterLabel; })
    : modeCards;
  var sessionDone = !pool.length && allInScope.length > 0;

  var emptyMsg = isSit
    ? '<h3>No situations yet</h3><p>Go to Cards tab, pick <strong>Situation</strong> type and add some.</p>'
    : '<h3>No cards yet</h3><p>Go to Cards tab to add words.</p>';

  if (!S.current || !pool.find(function(c) { return c.id === S.current.id; })) {
    if (sessionDone) {
      html += '<div class="empty-state"><h3>All done!</h3><p>You knew every card. Tap ↺ to start over.</p></div>';
    } else if (!pool.length && S.filterLabel) {
      html += '<div class="empty-state"><h3>No cards in "' + esc(S.filterLabel) + '"</h3><p>Add some cards with this label in the Cards tab.</p></div>';
    } else {
      html += '<div class="empty-state">' + emptyMsg + '</div>';
    }
  } else {
    var c = S.current;
    var frontLang = isSit ? 'Situation' : (S.direction === 'en-ru' ? 'English' : 'Russian');
    var backLang  = isSit ? 'Feeling'   : (S.direction === 'en-ru' ? 'Russian'  : 'English');
    var frontWord = isSit ? c.english   : (S.direction === 'en-ru' ? c.english  : c.russian);
    var backWord  = isSit ? c.russian   : (S.direction === 'en-ru' ? c.russian  : c.english);
    html += '<div class="card-container">' +
      '<div class="card' + (S.flipped ? ' flipped' : '') + '" onclick="flip()" id="fc">' +
        '<div class="card-face">' +
          '<div class="card-lang">' + frontLang + '</div>' +
          '<div class="card-word">' + esc(frontWord) + '</div>' +
          (c.label ? '<div class="card-tag">' + esc(c.label) + '</div>' : '') +
          '<div class="card-hint">tap to reveal</div>' +
        '</div>' +
        '<div class="card-face card-back">' +
          '<div class="card-lang">' + backLang + '</div>' +
          '<div class="card-word">' + esc(backWord) + '</div>' +
        '</div>' +
      '</div></div>';

    if (S.flipped) {
      html += '<div class="action-row">' +
        '<button class="btn btn-unknown" onclick="markCard(false)">✗ Don\'t know</button>' +
        '<button class="btn btn-known" onclick="markCard(true)">✓ Know it</button>' +
        '</div>';
    } else {
      html += '<button class="skip-btn" onclick="skip()">Skip →</button>';
    }
  }
  html += renderStopwatch();
  html += '</div>';
  return html;
}

function renderStopwatch() {
  return '<div class="stopwatch">' +
    '<span class="stopwatch-time" id="sw-display">' + fmtTime(swCurrentMs()) + '</span>' +
    '<button class="sw-btn' + (S.swRunning ? ' running' : '') + '" onclick="swToggle()">' + (S.swRunning ? 'Pause' : 'Start') + '</button>' +
    '<button class="sw-btn" onclick="swReset()">Reset</button>' +
    '</div>';
}

function renderManage() {
  var mtf = S.manageTypeFilter;
  var typePool = mtf === 'situation' ? S.cards.filter(isSituation)
               : mtf === 'vocab'     ? S.cards.filter(isVocab)
               : S.cards;
  var labels = uniqueLabels(mtf || null);
  var displayCards = S.manageFilter
    ? typePool.filter(function(c) { return c.label === S.manageFilter; })
    : typePool;
  var sorted = displayCards.slice().sort(function(a,b){ return (b.unknown||0)-(a.unknown||0); });

  var isSit = S.addType === 'situation';
  var fldA = isSit ? 'Situation' : 'English';
  var fldB = isSit ? 'Feeling / Response' : 'Russian';
  var phA  = isSit ? 'the shop is closed' : 'to procrastinate';
  var phB  = isSit ? 'frustrating' : 'откладывать';

  var html = '<div class="manage-area">';
  html += '<div id="saving-lbl" class="saving"></div>';
  if (S.err) html += '<div class="error-banner">' + esc(S.err) + '</div>';

  html += '<div class="add-form"><h3>Add card</h3>' +
    '<div style="display:flex;gap:6px;margin-bottom:14px">' +
      '<button class="fpill' + (!isSit ? ' active' : '') + '" onclick="setAddType(\'vocab\')">Vocab</button>' +
      '<button class="fpill' + (isSit ? ' active' : '') + '" onclick="setAddType(\'situation\')">Situation</button>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label>' + fldA + '</label><input id="inp-en" type="text" placeholder="' + phA + '" /></div>' +
      '<div class="form-group"><label>' + fldB + '</label><input id="inp-ru" type="text" placeholder="' + phB + '" /></div>' +
    '</div>' +
    '<div class="form-group"><label>Label <span style="font-weight:400;text-transform:none">(optional)</span></label>' +
    '<input id="inp-lbl" type="text" list="label-suggestions" placeholder="e.g. emotions" />' +
    '<datalist id="label-suggestions">' + uniqueLabels(S.addType).map(function(l) { return '<option value="' + esc(l) + '">'; }).join('') + '</datalist>' +
    '</div>' +
    '<button class="btn btn-primary btn-full" onclick="submitCard()">Add</button>' +
    (S.addMsg ? '<div class="' + (S.addMsg[0] === '✓' ? 'import-msg-ok' : 'import-msg-err') + '" style="margin-top:10px">' + esc(S.addMsg) + '</div>' : '') +
    '</div>';

  // Import panel
  html += '<div class="import-panel">' +
    '<div class="import-header" onclick="toggleImport()">' +
      '<span>Import JSON</span>' +
      '<span class="chevron' + (S.importOpen ? ' open' : '') + '">▼</span>' +
    '</div>';
  if (S.importOpen) {
    html += '<div class="import-body">' +
      '<p>Expected format: <code>[{"english":"word","russian":"слово","label":"noun"}, ...]</code><br>' +
      'The <code>label</code> field is optional. Existing cards with the same English text are skipped.</p>' +
      '<label class="import-file-btn">📂 Choose JSON file<input type="file" accept=".json" style="display:none" onchange="handleFileImport(this)"></label>' +
      '<div class="import-or">— or paste JSON below —</div>' +
      '<textarea class="import-textarea" id="import-txt" placeholder=\'[{"english": "to procrastinate", "russian": "откладывать", "label": "verb"}]\'></textarea>' +
      '<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="importFromTextarea()">Import</button>' +
      (S.importMsg ? '<div class="' + (S.importMsg[0] === '✓' ? 'import-msg-ok' : 'import-msg-err') + '">' + esc(S.importMsg) + '</div>' : '') +
    '</div>';
  }
  html += '</div>';

  // Type + label filters
  html += '<div class="manage-controls" style="flex-direction:column;align-items:stretch;gap:8px">';
  html += '<div class="filter-pills">' +
    '<button class="fpill' + (!mtf ? ' active' : '') + '" onclick="setManageTypeFilter(\'\')">All (' + S.cards.length + ')</button>' +
    '<button class="fpill' + (mtf === 'vocab' ? ' active' : '') + '" onclick="setManageTypeFilter(\'vocab\')">Vocab (' + S.cards.filter(isVocab).length + ')</button>' +
    '<button class="fpill' + (mtf === 'situation' ? ' active' : '') + '" onclick="setManageTypeFilter(\'situation\')">Situations (' + S.cards.filter(isSituation).length + ')</button>' +
  '</div>';
  if (labels.length > 0) {
    html += '<div class="manage-filter">' +
      '<button class="fpill' + (!S.manageFilter ? ' active' : '') + '" onclick="setManageFilter(\'\')">All labels</button>';
    labels.forEach(function(lbl) {
      html += '<button class="fpill' + (S.manageFilter === lbl ? ' active' : '') + '" onclick="setManageFilter(\'' + esc(lbl) + '\')">' + esc(lbl) + '</button>';
    });
    html += '</div>';
  }
  html += '</div>';

  var PAGE_SIZE = 20;
  var totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  var page = Math.min(Math.max(S.managePage, 0), totalPages - 1);
  var pageCards = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  html += '<div class="cards-list">';
  if (!sorted.length) {
    html += '<div class="empty-state" style="padding:32px 0"><p>' + (S.manageFilter ? 'No cards with this label.' : 'No cards yet.') + '</p></div>';
  } else {
    pageCards.forEach(function(c) {
      html += '<div class="card-item">' +
        '<div class="card-item-text">' +
          '<div class="card-item-en">' + esc(c.english) + '</div>' +
          '<div class="card-item-ru">' + esc(c.russian) + '</div>' +
          '<div class="card-item-meta">' +
            (c.type === 'situation' ? '<span class="label-badge sit-badge">situation</span>' : '') +
            (c.label ? '<span class="label-badge">' + esc(c.label) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="card-item-score"><span class="s-k">✓' + (c.known||0) + '</span> <span class="s-u">✗' + (c.unknown||0) + '</span></div>' +
        '<button class="del-btn" onclick="delCard(\'' + c.id + '\')">×</button>' +
        '</div>';
    });
  }
  html += '</div>';

  if (totalPages > 1) {
    html += '<div class="pagination">' +
      '<button class="page-btn" onclick="setManagePage(' + (page - 1) + ')"' + (page === 0 ? ' disabled' : '') + '>←</button>' +
      '<span class="page-info">' + (page + 1) + ' / ' + totalPages + '</span>' +
      '<button class="page-btn" onclick="setManagePage(' + (page + 1) + ')"' + (page >= totalPages - 1 ? ' disabled' : '') + '>→</button>' +
      '</div>';
  }

  html += '</div>';
  return html;
}

// ── Stopwatch ─────────────────────────────────────────────────────────────────

var swTimer = null;

function swCurrentMs() {
  if (!S.swRunning) return S.swElapsed;
  return S.swElapsed + (Date.now() - S.swStarted);
}

function fmtTime(ms) {
  var total = Math.floor(ms / 1000);
  var h = Math.floor(total / 3600);
  var m = Math.floor((total % 3600) / 60);
  var s = total % 60;
  if (h > 0) return pad(h) + ':' + pad(m) + ':' + pad(s);
  return pad(m) + ':' + pad(s);
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function swTick() {
  var el = document.getElementById('sw-display');
  if (el) el.textContent = fmtTime(swCurrentMs());
}

function swToggle() {
  if (S.swRunning) {
    S.swElapsed = swCurrentMs();
    S.swRunning = false;
    clearInterval(swTimer);
    swTimer = null;
  } else {
    S.swStarted = Date.now();
    S.swRunning = true;
    swTimer = setInterval(swTick, 500);
  }
  render();
}

function swReset() {
  S.swRunning = false;
  S.swElapsed = 0;
  S.swStarted = 0;
  clearInterval(swTimer);
  swTimer = null;
  render();
}

// ── Actions ───────────────────────────────────────────────────────────────────

function showView(v) {
  S.view = v; S.err = ''; S.addMsg = '';
  if (v === 'study' && !S.current) { S.current = nextCard(); S.flipped = false; }
  if (v !== 'study' && S.swRunning) {
    S.swElapsed = swCurrentMs();
    S.swRunning = false;
    clearInterval(swTimer);
    swTimer = null;
  }
  render(); updateNav();
}

function flip() { S.flipped = !S.flipped; render(); }

function skip() {
  S.lastId = S.current ? S.current.id : null;
  S.current = nextCard();
  S.flipped = false;
  render();
}

function setFilter(label) {
  S.filterLabel = label;
  S.shuffleQueue = [];
  S.lastId = null;
  S.flipped = false;
  S.current = nextCard();
  render();
}

function setManageFilter(label) {
  S.manageFilter = label;
  S.managePage = 0;
  render();
}

function setManageTypeFilter(t) {
  S.manageTypeFilter = t;
  S.manageFilter = '';
  S.managePage = 0;
  render();
}

function setAddType(t) {
  S.addType = t;
  S.addMsg = '';
  render();
}

function showStudyMode(mode) {
  S.studyMode = mode;
  S.filterLabel = '';
  S.shuffleQueue = [];
  S.lastId = null;
  S.flipped = false;
  S.sessionKnown = 0;
  S.sessionUnknown = 0;
  S.sessionKnownIds = {};
  S.current = nextCard();
  showView('study');
}

function setManagePage(p) {
  S.managePage = p;
  render();
}

function resetSession() {
  S.sessionKnown = 0;
  S.sessionUnknown = 0;
  S.sessionKnownIds = {};
  S.shuffleQueue = [];
  S.lastId = null;
  S.current = nextCard();
  S.flipped = false;
  render();
}

function toggleDirection() {
  S.direction = S.direction === 'en-ru' ? 'ru-en' : 'en-ru';
  S.flipped = false;
  render();
}

function toggleShuffle() {
  S.shuffleMode = !S.shuffleMode;
  S.shuffleQueue = [];
  S.lastId = null;
  S.flipped = false;
  S.current = nextCard();
  render();
}

function toggleImport() {
  S.importOpen = !S.importOpen;
  S.importMsg = '';
  render();
}

function parseImportJSON(text) {
  var data = JSON.parse(text);
  if (Array.isArray(data)) return data;
  if (data && Array.isArray(data.cards)) return data.cards;
  throw new Error('Expected an array or {"cards": [...]}');
}

function doImport(raw) {
  var items;
  try { items = parseImportJSON(raw); }
  catch(e) { S.importMsg = '✗ Invalid JSON: ' + e.message; render(); return; }

  var added = 0, skipped = 0;
  items.forEach(function(c) {
    if (!c.english || !c.russian) { skipped++; return; }
    var importType = c.type === 'situation' ? 'situation' : 'vocab';
    var dup = S.cards.some(function(x) {
      return x.type === importType && x.english.toLowerCase() === c.english.trim().toLowerCase();
    });
    if (dup) { skipped++; return; }
    var t = c.type === 'situation' ? 'situation' : 'vocab';
    var enVal = t === 'situation' ? c.english.trim() : c.english.trim().toLowerCase();
    var ruVal = t === 'situation' ? c.russian.trim() : c.russian.trim().toLowerCase();
    S.cards.push({ id: uid(), english: enVal, russian: ruVal, label: (c.label || '').trim(), known: 0, unknown: 0, type: t });
    added++;
  });

  if (!added && !skipped) { S.importMsg = '✗ No valid cards found in the file'; render(); return; }
  S.importMsg = '✓ Imported ' + added + ' card' + (added !== 1 ? 's' : '') + (skipped ? ', skipped ' + skipped + ' duplicates' : '');
  if (!S.current) S.current = nextCard();
  scheduleSave();
  render();
}

function importFromTextarea() {
  var el = document.getElementById('import-txt');
  if (!el || !el.value.trim()) { S.importMsg = '✗ Paste some JSON first'; render(); return; }
  doImport(el.value.trim());
}

function handleFileImport(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { doImport(e.target.result); };
  reader.onerror = function() { S.importMsg = '✗ Could not read file'; render(); };
  reader.readAsText(file);
}

function submitCard() {
  var en = document.getElementById('inp-en');
  var ru = document.getElementById('inp-ru');
  var lbl = document.getElementById('inp-lbl');
  if (!en || !ru) return;
  if (!en.value.trim() || !ru.value.trim()) { S.addMsg = '✗ Fill both fields'; render(); return; }
  var ok = addCard(en.value, ru.value, lbl ? lbl.value : '', S.addType);
  if (!ok) { S.addMsg = '✗ "' + en.value.trim() + '" already exists'; render(); return; }
  S.addMsg = '';
  en.value = ''; ru.value = '';
  if (lbl) lbl.value = '';
  en.focus();
  render();
}

function showTokenScreen() {
  S._prevView = S.view !== 'token' ? S.view : (S._prevView || 'study');
  S._prevStudyMode = S.studyMode;
  S.view = 'token';
  S.err = '';
  render(); updateNav();
}

function backFromToken() {
  S.view = (S._prevView && S._prevView !== 'token') ? S._prevView : 'study';
  S.studyMode = S._prevStudyMode || 'vocab';
  S._prevView = null;
  S._prevStudyMode = null;
  S.err = '';
  render(); updateNav();
}

function connect() {
  var inp = document.getElementById('tok');
  if (!inp || !inp.value.trim()) return;
  S.token = inp.value.trim();
  S.err = '';
  var btn = document.getElementById('conn-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Connecting…'; }
  initGist()
    .then(function() {
      localStorage.setItem('fc_token', S.token);
      S.view = S._prevView || 'study';
      S.studyMode = S._prevStudyMode || 'vocab';
      S._prevView = null;
      S._prevStudyMode = null;
      S.current = nextCard();
      render(); updateNav();
    })
    .catch(function(e) {
      S.err = e.message + ' — make sure you use a classic token (ghp_…) with gist scope';
      S.token = ''; S.gistId = '';
      render();
    });
}

function resetToken() {
  S.token = ''; S.gistId = ''; S.cards = []; S.current = null; S.err = '';
  S.filterLabel = ''; S.manageFilter = ''; S.manageTypeFilter = ''; S.shuffleMode = false; S.shuffleQueue = []; S.direction = 'en-ru'; S.importOpen = false; S.importMsg = ''; S.addMsg = ''; S.managePage = 0; S.sessionKnown = 0; S.sessionUnknown = 0; S.sessionKnownIds = {}; S.studyMode = 'vocab'; S.addType = 'vocab';
  localStorage.removeItem('fc_token');
  localStorage.removeItem('fc_gist_id');
  render(); updateNav();
}

function updateNav() {
  var nav = document.getElementById('main-nav');
  if (!nav) return;
  if (S.token) {
    if (S.view === 'token') {
      nav.innerHTML =
        '<button onclick="backFromToken()">← Back</button>' +
        '<button class="reset-btn active" title="Token settings">⚙</button>';
    } else {
      var studyActive = S.view === 'study' && S.studyMode === 'vocab';
      var sitActive   = S.view === 'study' && S.studyMode === 'situation';
      nav.innerHTML =
        '<button class="' + (studyActive ? 'active' : '') + '" onclick="showStudyMode(\'vocab\')">Study</button>' +
        '<button class="' + (sitActive   ? 'active' : '') + '" onclick="showStudyMode(\'situation\')">Situations</button>' +
        '<button class="' + (S.view === 'manage' ? 'active' : '') + '" onclick="showView(\'manage\')">Cards</button>' +
        '<button class="reset-btn" onclick="showTokenScreen()" title="Token settings">⚙</button>';
    }
  } else {
    nav.innerHTML = '';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

(function() {
  updateNav();
  if (S.token && S.gistId) {
    loadGist()
      .then(function() { S.current = nextCard(); render(); })
      .catch(function(e) { S.err = e.message; render(); });
  } else if (S.token) {
    initGist()
      .then(function() { S.current = nextCard(); render(); })
      .catch(function(e) { S.err = e.message; render(); });
  } else {
    render();
  }
})();
</script>
</body>
</html>
